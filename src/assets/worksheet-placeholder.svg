<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 792" width="612" height="792">
  <rect width="612" height="792" fill="white"/>
  <rect x="40" y="30" width="532" height="60" rx="4" fill="#f0f0f0"/>
  <text x="306" y="68" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#333">Math Worksheet - Grade 3</text>
  <line x1="40" y1="100" x2="572" y2="100" stroke="#ccc" stroke-width="1"/>
  <text x="50" y="130" font-family="sans-serif" font-size="14" fill="#666">Name: ___________________</text>
  <text x="350" y="130" font-family="sans-serif" font-size="14" fill="#666">Date: ___________________</text>
  <text x="50" y="180" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">Directions: Solve each problem. Show your work.</text>
  <text x="50" y="230" font-family="sans-serif" font-size="15" fill="#444">1.  24 + 38 = ______</text>
  <rect x="60" y="245" width="200" height="50" rx="4" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <text x="50" y="330" font-family="sans-serif" font-size="15" fill="#444">2.  56 - 19 = ______</text>
  <rect x="60" y="345" width="200" height="50" rx="4" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <text x="50" y="430" font-family="sans-serif" font-size="15" fill="#444">3.  7 × 6 = ______</text>
  <rect x="60" y="445" width="200" height="50" rx="4" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <text x="50" y="530" font-family="sans-serif" font-size="15" fill="#444">4.  45 ÷ 5 = ______</text>
  <rect x="60" y="545" width="200" height="50" rx="4" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <text x="50" y="630" font-family="sans-serif" font-size="15" fill="#444">5.  Round 67 to the nearest ten: ______</text>
  <rect x="60" y="645" width="200" height="50" rx="4" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <line x1="40" y1="720" x2="572" y2="720" stroke="#ccc" stroke-width="1"/>
  <text x="306" y="755" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999">SmartPaper - Student Feedback Assistant</text>
</svg>
